plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'app.perazzo.piecefulgames'
version = '0.1.0'

android {
  namespace "app.perazzo.piecefulgames"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.google.android.gms:play-services-games-v2:21.0.0"
}
